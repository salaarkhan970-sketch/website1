<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Wisdom</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background-elements">
    </div>

    <header>
        <nav>
            <div class="logo">Digital<span>Wisdom</span></div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="love">Mohabbat (Love)</button>
                <button class="filter-btn" data-filter="truth">Sachai (Truth)</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Digital <span class="highlight">Wisdom</span></h1>
            <p>Discover profound insights and eternal truths for the modern age. <br> Explore the fountain of knowledge
                from great minds.
            </p>
        </section>

        <section class="quotes-grid" id="quotes-grid">
            <!-- Quotes will be injected here by JS -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Digital Wisdom. Crafted with <i class="fas fa-heart"></i></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
